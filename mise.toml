[tools]
"usage"            = "latest" # Mise completion spec for tasks
"aqua:pamburus/hl" = "latest" # Structured log viewer

"go"                                       = "1.26.4" # i dunno what it is
"go:github.com/pressly/goose/v3/cmd/goose" = "latest" # (embedded) database migrations
"go:github.com/a-h/templ/cmd/templ"        = "latest" # Go generator for web templats
"sqlc"                                     = "latest" # Go generator for SQL queries

"golangci-lint"                      = "latest" # Extensive Go linter
"go:go.uber.org/nilaway/cmd/nilaway" = "latest" # Additionnal linter alerting on potential nil value panics
                                                # *could* be embedded in golangci-lint by custom building the latter,
                                                # but that's a chore

# cf https://www.datadoghq.com/blog/engineering/agent-go-binaries/
"goreleaser"                                    = "latest" # Pipeliner to build & release binaries
"upx"                                           = "latest" # Build artifact compressor, configured in .goreleaser.yaml
"go:github.com/loov/goda"                       = "latest" # Golang Dependancy Analyser : who depends on what, what packages are heaviest
"go:github.com/Zxilly/go-size-analyzer/cmd/gsa" = "latest" # Analyze binary size by package installed.

"node"            = "latest" # provides npm
"npm:tailwindcss" = "latest" # generates css from templates

[env]
IDP_DB_STRING = "./tmp/test.db"
GOOSE_DRIVER = "sqlite3"
GOOSE_DBSTRING = "./tmp/test.db"
GOOSE_MIGRATION_DIR = "internal/db/migrations"

[tasks.app]
description = "Run the application"
usage = '''
flag "-d --display <display>" help="Display format :raw(default), human or nested" {
  choices "raw" "human" "nested"
}
'''
run = '''
# Running application
case "${usage_display:-}" in
  human)
    go run . serve --verbose | hl --follow -x 'always' --flatten 'never'
    ;;
  nested)
    go run . serve --verbose | jq 'reduce to_entries[] as $kv ({}; setpath($kv.key|split("."); $kv.value))'
    ;;
  *)
    go run . serve --verbose | jq
    ;;
esac
'''

[tasks."app:build"]
run = "goreleaser release --snapshot --clean"

[tasks.pre-commit]
description = "Run tests, benches and linters"
run = '''
set -euo pipefail
echo === Tests ===
go test ./...
# TODO Bench
echo
echo === Lint ===
echo "Nilway:"
nilaway '-include-pkgs=idp/cmd,idp/internal/app,idp/internal/db,idp/internal/config,idp/internal/handler,idp/internal/log,idp/internal/server,idp/internal/service,idp/internal/web' ./...
echo -e "\nGolangCI :"
golangci-lint run --fix --disable godox --issues-exit-code 1 2>/dev/null
echo -e "\nTempl :"
templ fmt . --fail 2>&1
'''

[tasks."app:clean"]
description = "Remove build artifacts"
run = '''
echo "Cleaning..."
rm -rf dist tmp
find -name '*_templ.go' -delete
find internal/db/queries -name '*.go' -delete
'''

[tasks."db:create"]
run = '''
mkdir -p tmp
touch tmp/test.db
goose up
'''

[tasks."pre-commit:nilaway"]
run = ""
